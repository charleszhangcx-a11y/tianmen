<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>天门顺过</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --felt: #1f5c4d;
    --felt-dark: #163f36;
    --felt-light: #2a7a66;
    --wood: #8a5a2b;
    --wood-light: #c8923f;
    --cream: #f4ecd8;
    --card-bg: #fbf7ed;
    --ink: #2a2018;
    --red: #c0392b;
    --gold: #e3b04b;
    --shadow: rgba(0,0,0,0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--felt-dark);
    color: var(--cream);
    overflow: hidden;
    user-select: none;
  }
  #app { height: 100%; display: flex; flex-direction: column; }

  /* ---------- 通用 ---------- */
  .screen { flex: 1; display: none; flex-direction: column; }
  .screen.active { display: flex; }
  .btn {
    background: linear-gradient(180deg, var(--wood-light), var(--wood));
    color: #fff; border: none; border-radius: 12px;
    padding: 14px 22px; font-size: 17px; font-weight: 600;
    box-shadow: 0 3px 0 #6b4420, 0 4px 8px var(--shadow);
    cursor: pointer; transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #6b4420; }
  .btn:disabled { opacity: .45; box-shadow: none; }
  .btn.ghost {
    background: transparent; border: 2px solid var(--wood-light);
    box-shadow: none; color: var(--wood-light);
  }
  .btn.danger { background: linear-gradient(180deg, #d4584a, var(--red)); box-shadow: 0 3px 0 #7d251c; }

  /* ---------- 大厅 ---------- */
  #lobby { justify-content: center; align-items: center; padding: 24px;
    background: radial-gradient(circle at 50% 30%, var(--felt-light), var(--felt-dark)); }
  .logo { text-align: center; margin-bottom: 30px; }
  .logo h1 {
    font-size: 52px; letter-spacing: 6px; color: var(--gold);
    text-shadow: 0 2px 0 #8a6418, 0 4px 12px rgba(0,0,0,.5);
    font-weight: 800;
  }
  .logo .sub { margin-top: 6px; font-size: 14px; color: var(--cream); opacity: .8; letter-spacing: 3px; }
  .panel {
    background: rgba(0,0,0,.25); border: 1px solid rgba(227,176,75,.3);
    border-radius: 18px; padding: 22px; width: 100%; max-width: 380px;
    backdrop-filter: blur(4px);
  }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; margin-bottom: 6px; opacity: .8; }
  .field input {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: none;
    background: var(--cream); color: var(--ink); font-size: 16px;
  }
  .seg { display: flex; gap: 8px; }
  .seg button {
    flex: 1; padding: 12px 0; border-radius: 10px; border: 2px solid rgba(227,176,75,.3);
    background: transparent; color: var(--cream); font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .seg button.on { background: var(--gold); color: var(--ink); border-color: var(--gold); }
  .row { display: flex; gap: 10px; margin-top: 8px; }
  .row .btn { flex: 1; }
  .hint { font-size: 12px; opacity: .6; text-align: center; margin-top: 14px; line-height: 1.6; }

  /* ---------- 牌桌 ---------- */
  #table { background: radial-gradient(ellipse at 50% 42%, var(--felt-light), var(--felt) 55%, var(--felt-dark)); }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: rgba(0,0,0,.25);
  }
  .topbar .room { font-size: 14px; }
  .topbar .room b { color: var(--gold); font-size: 18px; letter-spacing: 2px; }
  .topbar .actions { display: flex; gap: 8px; }
  .topbar .mini {
    font-size: 13px; padding: 7px 12px; border-radius: 8px;
    background: var(--wood); color: #fff; border: none; font-weight: 600;
  }

  /* 其他玩家 */
  .opponents { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 14px; justify-content: center; }
  .opp {
    background: rgba(0,0,0,.28); border-radius: 12px; padding: 8px 12px;
    min-width: 92px; text-align: center; border: 2px solid transparent;
  }
  .opp.turn { border-color: var(--gold); box-shadow: 0 0 14px rgba(227,176,75,.5); }
  .opp.offline { opacity: .45; }
  .opp .nm { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .opp .cc { font-size: 12px; opacity: .85; }
  .opp .cc .num { color: var(--gold); font-weight: 700; }
  .opp .badge { font-size: 10px; background: var(--red); border-radius: 6px; padding: 1px 5px; margin-left: 4px; }
  .opp .host { color: var(--gold); }

  /* 中央出牌区 */
  .center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 8px; }
  .last-play { display: flex; gap: -10px; min-height: 90px; align-items: center; }
  .center .tip { font-size: 14px; opacity: .8; text-align: center; min-height: 20px; }
  .center .tip.big { font-size: 18px; color: var(--gold); font-weight: 600; }

  /* 牌 */
  .card {
    width: 50px; height: 72px; background: var(--card-bg); border-radius: 7px;
    box-shadow: 0 2px 5px var(--shadow); position: relative; flex-shrink: 0;
    border: 1px solid rgba(0,0,0,.15); display: flex; flex-direction: column;
    justify-content: space-between; padding: 4px; color: var(--ink);
  }
  .card.sm { width: 38px; height: 54px; }
  .card .corner { font-size: 15px; font-weight: 800; line-height: 1; }
  .card .corner.br { align-self: flex-end; transform: rotate(180deg); }
  .card.sm .corner { font-size: 12px; }
  .card.red { color: var(--red); }
  .card.wild {
    background: linear-gradient(135deg, #2a2018, #4a3520);
    color: var(--gold); justify-content: center; align-items: center;
  }
  .card.wild .wtext { font-size: 13px; font-weight: 800; text-align: center; line-height: 1.2; }
  .card.sm.wild .wtext { font-size: 10px; }
  .last-play .card { margin-left: -8px; }
  .last-play .card:first-child { margin-left: 0; }

  /* 自己手牌 */
  .myarea { background: rgba(0,0,0,.3); padding: 10px 8px 14px; }
  .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; align-items: center; }
  .controls .turn-tip { font-size: 14px; color: var(--gold); font-weight: 600; }
  .hand {
    display: flex; justify-content: center; flex-wrap: wrap;
    padding: 0 4px; min-height: 78px; gap: 2px;
  }
  .hand .card { cursor: pointer; transition: transform .12s; margin-left: -6px; }
  .hand .card:first-child { margin-left: 0; }
  .hand .card.sel { transform: translateY(-16px); box-shadow: 0 6px 12px var(--shadow); border-color: var(--gold); }

  /* 结算 / 提示浮层 */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.65);
    display: none; align-items: center; justify-content: center; z-index: 50; padding: 24px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: linear-gradient(180deg, var(--felt-light), var(--felt-dark));
    border: 2px solid var(--gold); border-radius: 18px; padding: 26px;
    width: 100%; max-width: 340px; text-align: center;
  }
  .modal h2 { color: var(--gold); font-size: 26px; margin-bottom: 16px; letter-spacing: 2px; }
  .modal .rank { text-align: left; margin-bottom: 18px; }
  .modal .rank div { padding: 8px 12px; background: rgba(0,0,0,.25); border-radius: 8px; margin-bottom: 6px; font-size: 15px; }
  .modal .rank div .pos { color: var(--gold); font-weight: 700; margin-right: 8px; }

  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.8); color: #fff; padding: 10px 18px; border-radius: 20px;
    font-size: 14px; z-index: 60; opacity: 0; transition: opacity .2s; pointer-events: none;
    max-width: 80%; text-align: center;
  }
  .toast.show { opacity: 1; }

  /* 语音浮层提示 */
  .voice-pop {
    position: fixed; left: 50%; bottom: 200px; transform: translateX(-50%) scale(0);
    background: var(--gold); color: var(--ink); padding: 12px 24px; border-radius: 30px;
    font-size: 20px; font-weight: 800; z-index: 40; transition: transform .25s;
    box-shadow: 0 4px 16px rgba(0,0,0,.4); white-space: nowrap;
  }
  .voice-pop.show { transform: translateX(-50%) scale(1); }

  .waiting-note { text-align: center; padding: 16px; font-size: 14px; opacity: .8; line-height: 1.7; }
</style>
</head>
<body>
<div id="app">
  <!-- 大厅 -->
  <section id="lobby" class="screen active">
    <div class="logo">
      <h1>天门顺过</h1>
      <div class="sub">熟 人 同 乐 · 不 赌 不 充</div>
    </div>
    <div class="panel">
      <div class="field">
        <label>你的昵称</label>
        <input id="nameInput" maxlength="8" placeholder="输入昵称" />
      </div>
      <div class="field">
        <label>人数(创建房间时)</label>
        <div class="seg" id="seatSeg">
          <button data-n="3">3人</button>
          <button data-n="4" class="on">4人</button>
          <button data-n="5">5人</button>
          <button data-n="6">6人</button>
        </div>
      </div>
      <div class="row">
        <button class="btn" id="createBtn">创建房间</button>
      </div>
      <div class="field" style="margin-top:18px;">
        <label>或输入房号加入</label>
        <input id="roomInput" inputmode="numeric" maxlength="4" placeholder="4位房号" />
      </div>
      <div class="row">
        <button class="btn ghost" id="joinBtn">加入房间</button>
      </div>
      <div class="hint">创建后可生成微信分享链接<br>朋友点开即可进同一房间</div>
    </div>
  </section>

  <!-- 牌桌 -->
  <section id="table" class="screen">
    <div class="topbar">
      <div class="room">房号 <b id="roomCode">----</b></div>
      <div class="actions">
        <button class="mini" id="shareBtn">分享</button>
        <button class="mini" id="voiceToggle">🔊 语音</button>
        <button class="mini" id="leaveBtn">退出</button>
      </div>
    </div>

    <div class="opponents" id="opponents"></div>

    <div class="center">
      <div class="tip" id="centerTip">等待开始</div>
      <div class="last-play" id="lastPlay"></div>
    </div>

    <div class="myarea">
      <div class="controls" id="controls"></div>
      <div class="hand" id="hand"></div>
    </div>
  </section>
</div>

<!-- 结算浮层 -->
<div class="overlay" id="resultOverlay">
  <div class="modal">
    <h2>本局结束</h2>
    <div class="rank" id="rankList"></div>
    <button class="btn" id="backLobbyBtn">返回大厅</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="voice-pop" id="voicePop"></div>

<script src="/game.js"></script>
</body>
</html>
